<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Auditoria - JP2Business</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2>Relatório de Auditoria</h2>
            <p class="text-muted">Rastro de atividades do JP2Business</p>
        </div>
        <a href="/" class="btn btn-secondary">Voltar ao Painel</a>
    </div>

    <table class="table table-hover table-bordered shadow-sm">
        <thead class="table-dark">
            <tr>
                <th>Data / Hora</th>
                <th>Sócio (Usuário)</th>
                <th>Ação Realizada</th>
            </tr>
        </thead>
        <tbody>
            {% for log in logs %}
            <tr>
                <td style="width: 200px;">{{ log.data_registro }}</td>
                <td><strong>{{ log.usuario }}</strong></td>
                <td>{{ log.acao }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
