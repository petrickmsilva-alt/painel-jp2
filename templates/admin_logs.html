<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>Painel de Auditoria | JP2BUSINESS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f8fafc; font-family: 'Segoe UI', sans-serif; padding: 30px 20px; }
        .logs-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            max-width: 1100px;
            margin: auto;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .header-auditoria {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        h2 { font-size: 1.5rem; color: #0f172a; font-weight: 700; margin: 0; }
        .badge-ip { background-color: #e0f2fe; color: #0369a1; font-weight: 600; font-family: monospace; }
        .table { font-size: 0.9rem; vertical-align: middle; }
        .table-thead { background-color: #f8fafc; color: #475569; font-weight: 600; }
        .btn-voltar {
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            background: #f1f5f9 !important;
            color: #334155 !important;
            border: 1px solid #cbd5e1 !important;
            border-radius: 6px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn-voltar:hover { background: #e2e8f0 !important; }
        .data-log { font-weight: 500; color: #64748b; }
    </style>
</head>
<body>

    <div class="logs-container">
        <div class="header-auditoria">
            <h2><i class="bi bi-shield-check text-success"></i> Relatório de Auditoria e Logs do Sistema</h2>
            <a href="/" class="btn-voltar">
                <i class="bi bi-arrow-left"></i> Voltar ao Painel
            </a>
        </div>

        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="table-thead">
                    <tr>
                        <th>Data / Hora (Brasília)</th>
                        <th>Usuário</th>
                        <th>Ação Executada</th>
                        <th>IP de Origem</th>
                    </tr>
                </thead>
                <tbody>
                    {% for log in logs %}
                    <tr>
                        <!-- Guardamos a data bruta no atributo 'data-raw' para o script formatar localmente -->
                        <td class="data-log" data-raw="{{ log.data_registro }}">{{ log.data_registro }}</td>
                        <td><strong>{{ log.usuario }}</strong></td>
                        <td>{{ log.acao }}</td>
                        <td><span class="badge badge-ip p-2">{{ log.ip_origem or '127.0.0.1' }}</span></td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="4" class="text-center text-muted py-4">Nenhum registro de auditoria encontrado.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Conversor inteligente de fuso horário e formato no navegador do usuário
            document.querySelectorAll(".data-log").forEach(function(el) {
                let dataBruta = el.getAttribute("data-raw");
                if (dataBruta) {
                    try {
                        let dataObjeto = new Date(dataBruta);
                        // Formata para o padrão brasileiro e ajusta o fuso horário automaticamente
                        let dataFormatada = dataObjeto.toLocaleString('pt-BR', {
                            day: '2-digit',
                            month: '2-digit',
                            year: 'numeric',
                            hour: '2-digit',
                            minute: '2-digit',
                            second: '2-digit'
                        });
                        el.textContent = dataFormatada.replace(', ', ' às ');
                    } catch (e) {
                        console.error("Erro ao formatar data: ", e);
                    }
                }
            });
        });
    </script>
</body>
</html>
