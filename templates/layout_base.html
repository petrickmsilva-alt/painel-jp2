<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Painel Financeiro | JP2 Business</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">

    <style>
        body {
            background: #f4f7fb;
            display: flex;
            margin: 0;
            min-height: 100vh;
        }

        #sidebar {
            background: #101a2b;
            border-right: 1px solid rgba(255, 255, 255, .08);
            color: white;
            flex-shrink: 0;
            padding: 24px 18px;
            width: 260px;
        }

        .sidebar-kicker {
            color: #93a4bd;
            font-size: 11px;
            font-weight: 850;
            letter-spacing: .1em;
            text-transform: uppercase;
        }

        .sidebar-title {
            font-size: 22px;
            font-weight: 850;
            line-height: 1.1;
            margin: 6px 0 18px;
        }

        .sidebar-divider {
            background: rgba(255, 255, 255, .12);
            height: 1px;
            margin: 18px 0;
        }

        .sidebar-section {
            color: #93a4bd;
            display: block;
            font-size: 11px;
            font-weight: 850;
            letter-spacing: .1em;
            margin: 20px 8px 8px;
            text-transform: uppercase;
        }

        #sidebar a {
            align-items: center;
            border: 1px solid transparent;
            border-radius: 8px;
            color: #d6e0ef;
            display: flex;
            font-weight: 750;
            gap: 10px;
            margin-bottom: 7px;
            padding: 11px 10px;
            text-decoration: none;
        }

        #sidebar a:hover,
        #sidebar a.active {
            background: #172b49;
            border-color: rgba(21, 94, 239, .45);
            color: #fff;
        }

        #sidebar i {
            color: #7fb4ff;
            font-size: 16px;
        }

        .content {
            flex-grow: 1;
            min-width: 0;
            overflow-x: hidden;
            padding: 30px;
        }

        @media (max-width: 820px) {
            body { display: block; }
            #sidebar { width: 100%; }
            .content { padding: 20px 14px; }
        }
    </style>
</head>
<body>
    <aside id="sidebar">
        <div class="sidebar-kicker">Painel financeiro</div>
        <div class="sidebar-title">Gestao de investimentos</div>
        <div class="sidebar-divider"></div>

        <a href="/"><i class="bi bi-arrow-left"></i> Voltar ao Painel</a>

        <span class="sidebar-section">Gestao</span>
        <a href="/financeiro"><i class="bi bi-pencil-square"></i> Cadastro</a>
        <a href="/financeiro/relacao"><i class="bi bi-table"></i> Relacao de emprestimos</a>
        <a href="/financeiro/detalhe"><i class="bi bi-calendar-range"></i> Detalhe do emprestimo</a>
        <a href="/financeiro/pagamentos"><i class="bi bi-receipt"></i> Pagamentos realizados</a>
        <a href="/financeiro/resumo"><i class="bi bi-pie-chart"></i> Resumo geral</a>
    </aside>

    <main class="content">
        {% block content %}{% endblock %}
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
</body>
</html>
