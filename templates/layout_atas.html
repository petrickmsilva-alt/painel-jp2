<!doctype html><html lang="pt-br"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{% block title %}Central de Atas{% endblock %} | JP2 Business</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>:root{--bg:#f3f6f4;--ink:#17211b;--muted:#68766e;--line:#dbe4de;--green:#26834a}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,Segoe UI,system-ui,sans-serif}.shell{display:flex;min-height:100vh}.side{background:linear-gradient(180deg,#111a14,#0c110e);color:#fff;flex:0 0 245px;padding:26px 17px;transition:margin-left .22s ease}.brand small{color:#8eaa99;display:block;font-size:10px;font-weight:900;letter-spacing:.14em;text-transform:uppercase}.brand strong{display:block;font-size:22px;margin:6px 0 22px}.side a{align-items:center;border:1px solid transparent;border-radius:8px;color:#dbe7df;display:flex;font-weight:800;gap:10px;margin:6px 0;padding:11px 12px;text-decoration:none}.side a:hover,.side a.active{background:#173321;border-color:#2b7346;color:#fff}.side i{color:#65c183}.menu-toggle{align-items:center;background:#fff;border:1px solid #cad8cf;border-radius:0 8px 8px 0;box-shadow:0 8px 22px rgba(0,0,0,.16);color:#1d3827;display:flex;height:38px;justify-content:center;left:245px;position:fixed;top:20px;transition:left .22s ease;width:38px;z-index:20}body.menu-collapsed .side{margin-left:-245px}body.menu-collapsed .menu-toggle{left:0}.main{flex:1;min-width:0;padding:30px}.top{align-items:center;display:flex;justify-content:space-between;gap:18px;margin-bottom:20px}.kicker{color:var(--green);font-size:11px;font-weight:900;letter-spacing:.12em;text-transform:uppercase}.title{font-size:30px;font-weight:900;margin:3px 0}.subtitle{color:var(--muted)}.panel{background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 15px 38px rgba(23,33,27,.06);padding:20px}.btn-primary{background:var(--green);border-color:var(--green);font-weight:800}.btn-outline-primary{border-color:var(--green);color:var(--green);font-weight:800}.form-label{font-size:12px;font-weight:850;color:#516057}.form-control,.form-select{border-color:#ccd9d1;border-radius:8px;min-height:43px}.form-control:focus,.form-select:focus{border-color:var(--green);box-shadow:0 0 0 .2rem rgba(38,131,74,.12)}.pill{border-radius:999px;display:inline-flex;font-size:11px;font-weight:900;padding:5px 9px}.pill-rascunho{background:#f2f4f7;color:#475467}.pill-revisao{background:#fff7ed;color:#b54708}.pill-aprovada{background:#ecfdf3;color:#078c55}.preline{white-space:pre-line}.flash{background:#eaf7ee;border:1px solid #b9ddc4;border-radius:8px;color:#176936;margin-bottom:16px;padding:11px 14px}@media(max-width:850px){.shell{display:block}.side{display:none}.menu-toggle{display:none}.main{padding:18px}.top{align-items:flex-start;flex-direction:column}}@media print{.side,.menu-toggle,.no-print{display:none!important}.main{padding:0}.panel{border:0;box-shadow:none}.shell{display:block}}</style></head>
<body><button class="menu-toggle no-print" type="button" onclick="alternarMenuAtas()" title="Ocultar ou mostrar menu"><i class="bi bi-layout-sidebar-inset"></i></button><div class="shell"><aside class="side"><div class="brand"><small>Memória institucional</small><strong>Central de Atas</strong></div><a href="/"><i class="bi bi-arrow-left"></i> Home executiva</a><a href="/atas" class="{% if request.path == '/atas' %}active{% endif %}"><i class="bi bi-journal-text"></i> Todas as atas</a><a href="/atas/nova" class="{% if '/nova' in request.path %}active{% endif %}"><i class="bi bi-file-earmark-plus"></i> Nova ata</a><a href="/tarefas"><i class="bi bi-kanban"></i> Central de tarefas</a></aside><main class="main">{% with mensagens=get_flashed_messages() %}{% for mensagem in mensagens %}<div class="flash">{{ mensagem }}</div>{% endfor %}{% endwith %}{% block content %}{% endblock %}</main></div><script>if(localStorage.getItem('jp2AtasMenu')==='fechado')document.body.classList.add('menu-collapsed');function alternarMenuAtas(){document.body.classList.toggle('menu-collapsed');localStorage.setItem('jp2AtasMenu',document.body.classList.contains('menu-collapsed')?'fechado':'aberto');}</script></body></html>
