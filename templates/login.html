<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login | JP2 BUSINESS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background-color: #eef2f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
    .login-card { width: 100%; max-width: 380px; padding: 40px; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    /* Logo reduzida para 100px */
    .logo-img { max-width: 100px; margin-bottom: 20px; }
    .btn-primary { background-color: #16a34a !important; border: none; padding: 10px; font-weight: 600; }
    .btn-primary:hover { background-color: #15803d !important; }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="text-center mb-4">
      <img src="{{ url_for('static', filename='image/jp2_business.jpeg') }}" alt="Logo JP2" class="logo-img">
      <!-- "JP2 BUSINESS" removido abaixo de PAINEL DADOS -->
      <h3 class="fw-bold text-dark">PAINEL DADOS</h3>
    </div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-danger p-2 text-center" style="font-size: 13px;">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="/login" method="POST">
      <div class="mb-3">
        <label class="form-label text-secondary small">UsuÃ¡rio</label>
        <input type="text" name="usuario" class="form-control" placeholder="Seu usuÃ¡rio" required>
      </div>
      <div class="mb-3">
        <label class="form-label text-secondary small">Senha</label>
        <div class="input-group">
          <input type="password" name="senha" id="senhaLogin" class="form-control" placeholder="••••••••" required>
          <button type="button" class="btn btn-outline-secondary" onclick="alternarSenha()" title="Mostrar ou ocultar senha">
            <i id="iconeSenha" class="bi bi-eye"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 mt-3 shadow-sm">Acessar Painel</button>
    </form>
    
    <div class="text-center mt-4">
        <img src="{{ url_for('static', filename='image/ibd.jpeg') }}" alt="Logo IBD" style="max-width: 80px; opacity: 0.6;">
    </div>
  </div>

  <script>
    function alternarSenha() {
      const input = document.getElementById('senhaLogin');
      const icon = document.getElementById('iconeSenha');
      const mostrando = input.type === 'text';
      input.type = mostrando ? 'password' : 'text';
      icon.className = mostrando ? 'bi bi-eye' : 'bi bi-eye-slash';
    }
  </script>
</body>
</html>
