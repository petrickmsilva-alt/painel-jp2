<!doctype html><html lang="pt-br"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{% block title %}Central de Tarefas{% endblock %} | JP2</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"><script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<style>:root{--bg:#0e1110;--side:#101512;--panel:#181e1b;--panel2:#202824;--line:#303b35;--text:#f2f6f3;--muted:#91a099;--green:#49b86c;--red:#f97066;--amber:#f6b44b;--blue:#5fa8ff}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 80% 0,rgba(73,184,108,.13),transparent 35%),var(--bg);color:var(--text);font-family:Inter,Segoe UI,system-ui,sans-serif}.shell{display:flex;min-height:100vh}.side{background:var(--side);border-right:1px solid var(--line);flex:0 0 245px;padding:25px 16px}.brand small{color:#81a08e;display:block;font-size:10px;font-weight:900;letter-spacing:.15em;text-transform:uppercase}.brand strong{display:block;font-size:22px;margin:7px 0 22px}.side a{align-items:center;border:1px solid transparent;border-radius:8px;color:#d8e3dc;display:flex;font-weight:800;gap:10px;margin:6px 0;padding:11px 12px;text-decoration:none}.side a:hover,.side a.active{background:#173222;border-color:#2c7346}.side i{color:var(--green)}.main{flex:1;min-width:0;padding:28px}.top{align-items:center;display:flex;justify-content:space-between;gap:18px;margin-bottom:18px}.kicker{color:#75d491;font-size:11px;font-weight:900;letter-spacing:.12em;text-transform:uppercase}.title{font-size:30px;font-weight:900;margin:3px 0}.muted{color:var(--muted)}.panel{background:var(--panel);border:1px solid var(--line);border-radius:11px;box-shadow:0 18px 42px rgba(0,0,0,.2)}.btn-primary{background:var(--green);border-color:var(--green);font-weight:850}.btn-outline-light{border-color:#435048;font-weight:800}.form-control,.form-select{background:#121714;border-color:#39463f;color:#f5f7f5;min-height:43px}.form-control:focus,.form-select:focus{background:#121714;border-color:var(--green);box-shadow:0 0 0 .2rem rgba(73,184,108,.15);color:#fff}.form-control::placeholder{color:#6f7c75}.form-label{color:#bcc8c1;font-size:12px;font-weight:850}.flash{background:#173622;border:1px solid #2c7346;border-radius:8px;color:#a9e5ba;margin-bottom:15px;padding:10px 13px}.pill{border-radius:999px;display:inline-flex;font-size:10px;font-weight:900;padding:4px 8px}.p-Urgente{background:rgba(249,112,102,.16);color:#ff9c94}.p-Alta{background:rgba(246,180,75,.15);color:#ffd17b}.p-Média{background:rgba(95,168,255,.15);color:#93c5ff}.p-Baixa{background:rgba(145,160,153,.15);color:#c5d0ca}@media(max-width:850px){.side{display:none}.main{padding:17px}.top{align-items:flex-start;flex-direction:column}}</style>{% block head %}{% endblock %}</head><body><div class="shell"><aside class="side"><div class="brand"><small>Central de Atas</small><strong>Tarefas</strong></div><a href="/atas"><i class="bi bi-arrow-left"></i> Voltar às atas</a><a href="/tarefas" class="{% if request.path=='/tarefas' %}active{% endif %}"><i class="bi bi-kanban"></i> Quadro de tarefas</a><a href="/tarefas/nova" class="{% if '/nova' in request.path %}active{% endif %}"><i class="bi bi-plus-square"></i> Nova tarefa</a><button id="ativarPush" class="btn btn-sm btn-outline-light w-100 mt-4" type="button"><i class="bi bi-bell"></i> Ativar notificações</button></aside><main class="main">{% with mensagens=get_flashed_messages() %}{% for m in mensagens %}<div class="flash">{{ m }}</div>{% endfor %}{% endwith %}{% block content %}{% endblock %}</main></div>
<script>window.OneSignalDeferred=window.OneSignalDeferred||[];fetch('/tarefas/push-config').then(r=>r.json()).then(c=>{if(!c.ativo){document.getElementById('ativarPush').title='Configure o OneSignal no Render';return;}OneSignalDeferred.push(async function(O){await O.init({appId:c.app_id,serviceWorkerPath:'/OneSignalSDKWorker.js',notifyButton:{enable:false}});await O.login(c.external_id);document.getElementById('ativarPush').onclick=async()=>{await O.Notifications.requestPermission();};});}).catch(()=>{});</script>{% block scripts %}{% endblock %}</body></html>
