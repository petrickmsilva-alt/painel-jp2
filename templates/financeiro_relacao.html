{% extends 'layout_base.html' %}

{% block content %}
<style>
    .head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:18px}.kicker{color:#667085;font-size:12px;font-weight:850;letter-spacing:.08em;text-transform:uppercase}.title{font-size:30px;font-weight:850;color:#101828;margin:3px 0 4px}.subtitle{color:#667085;font-size:14px;max-width:780px}.panel{background:#fff;border:1px solid #d9e2ef;border-radius:10px;box-shadow:0 14px 36px rgba(15,23,42,.06);overflow:hidden}.filter-panel{padding:16px;margin-bottom:16px}.table th{background:#f8fafc;color:#667085;font-size:11px;font-weight:850;text-transform:uppercase;white-space:nowrap}.table td{font-size:13px;vertical-align:middle}.money{font-weight:850;color:#101828;white-space:nowrap}.muted{color:#667085;font-size:12px}.pill{display:inline-flex;border-radius:999px;padding:5px 9px;font-size:11px;font-weight:850;white-space:nowrap}.pill-blue{background:#eef4ff;color:#155eef}.pill-green{background:#ecfdf3;color:#078c55}.pill-amber{background:#fff7ed;color:#b54708}.pill-red{background:#fef3f2;color:#d92d20}.pill-gray{background:#f2f4f7;color:#475467}.modal-content{border:0;border-radius:10px;box-shadow:0 22px 60px rgba(15,23,42,.22)}
</style>

<header class="head">
    <div><div class="kicker">Relacao de emprestimos</div><h1 class="title">Carteira consolidada</h1><div class="subtitle">Filtre, edite, exclua e lance pagamentos parciais dos recursos cadastrados.</div></div>
    <button class="btn btn-outline-secondary" onclick="window.print()"><i class="bi bi-printer"></i> Imprimir</button>
</header>

<section class="panel filter-panel">
    <div class="row g-2 align-items-end">
        <div class="col-lg-3"><label class="form-label small fw-bold text-secondary">Empresa</label><select class="form-select" id="filtroEmpresa"></select></div>
        <div class="col-lg-2"><label class="form-label small fw-bold text-secondary">Tipo</label><select class="form-select" id="filtroTipo"></select></div>
        <div class="col-lg-2"><label class="form-label small fw-bold text-secondary">Finalidade</label><select class="form-select" id="filtroFinalidade"></select></div>
        <div class="col-lg-2"><label class="form-label small fw-bold text-secondary">Status</label><select class="form-select" id="filtroStatus"><option value="">Todos</option><option>Em aberto</option><option>Parcial</option><option>Quitado</option><option>Vencido</option><option>Vencendo</option></select></div>
        <div class="col-lg-3"><label class="form-label small fw-bold text-secondary">Buscar</label><input class="form-control" id="filtroBusca" placeholder="Credor, captador, observacao"></div>
        <div class="col-lg-3"><label class="form-label small fw-bold text-secondary">Data recurso inicial</label><input type="date" class="form-control" id="filtroInicio"></div>
        <div class="col-lg-3"><label class="form-label small fw-bold text-secondary">Data pagamento final</label><input type="date" class="form-control" id="filtroFim"></div>
        <div class="col-lg-3"><label class="form-label small fw-bold text-secondary">Valor minimo</label><input class="form-control" id="filtroValorMin" oninput="formatarMoeda(this)"></div>
        <div class="col-lg-3 d-flex gap-2"><button class="btn btn-primary flex-fill" onclick="aplicarFiltros()">Filtrar</button><button class="btn btn-outline-secondary" onclick="limparFiltros()">Limpar</button></div>
    </div>
</section>

<section class="panel">
    <div class="table-responsive p-3">
        <table class="table table-hover align-middle" id="tabelaRelacao">
            <thead><tr><th>ID</th><th>Empresa</th><th>Credor</th><th>Tipo</th><th>Valor</th><th>Juros</th><th>Data recurso</th><th>Data pgto</th><th>Pago</th><th>Saldo</th><th>Status</th><th>Acoes</th></tr></thead>
            <tbody id="corpoRelacao"></tbody>
        </table>
    </div>
</section>

<div class="modal fade" id="modalPagamento" tabindex="-1" aria-hidden="true"><div class="modal-dialog modal-dialog-centered"><form class="modal-content" id="formPagamento"><div class="modal-header"><h5 class="modal-title fw-bold"><i class="bi bi-cash-coin text-success"></i> Lancar pagamento</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><input type="hidden" id="pagamentoInvestimentoId"><div class="mb-3"><label class="form-label small fw-bold text-secondary">Investimento</label><div id="pagamentoTitulo" class="fw-bold"></div></div><div class="mb-3"><label class="form-label small fw-bold text-secondary">Data</label><input type="date" class="form-control" id="dataPagamento" required></div><div class="mb-3"><label class="form-label small fw-bold text-secondary">Valor pago</label><input type="text" class="form-control" id="valorPagamento" oninput="formatarMoeda(this)" required></div><div><label class="form-label small fw-bold text-secondary">Observacoes</label><textarea class="form-control" id="obsPagamento" rows="2"></textarea></div></div><div class="modal-footer"><button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button><button type="submit" class="btn btn-success">Salvar pagamento</button></div></form></div></div>

<div class="modal fade" id="modalEditar" tabindex="-1" aria-hidden="true"><div class="modal-dialog modal-xl modal-dialog-centered"><form class="modal-content" id="formEditar"><div class="modal-header"><h5 class="modal-title fw-bold"><i class="bi bi-pencil-square text-primary"></i> Editar investimento</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><input type="hidden" id="editId"><div class="row g-3"><div class="col-lg-6"><label class="form-label small fw-bold text-secondary">Empresa</label><select class="form-select" id="editEmpresa"></select></div><div class="col-lg-6"><label class="form-label small fw-bold text-secondary">Credor</label><input class="form-control" id="editCredor"></div><div class="col-lg-6"><label class="form-label small fw-bold text-secondary">Captador</label><input class="form-control" id="editCaptador"></div><div class="col-lg-6"><label class="form-label small fw-bold text-secondary">Tipo</label><input class="form-control" id="editTipo"></div><div class="col-lg-6"><label class="form-label small fw-bold text-secondary">Finalidade</label><input class="form-control" id="editFinalidade"></div><div class="col-lg-6"><label class="form-label small fw-bold text-secondary">Valor</label><input class="form-control" id="editValor" oninput="formatarMoeda(this)"></div><div class="col-lg-4"><label class="form-label small fw-bold text-secondary">Juros %</label><input class="form-control" id="editJuros"></div><div class="col-lg-4"><label class="form-label small fw-bold text-secondary">Data recurso</label><input type="date" class="form-control" id="editDataRecurso"></div><div class="col-lg-4"><label class="form-label small fw-bold text-secondary">Data pgto</label><input type="date" class="form-control" id="editDataPgto"></div><div class="col-12"><label class="form-label small fw-bold text-secondary">Observacoes</label><textarea class="form-control" id="editObs" rows="2"></textarea></div></div></div><div class="modal-footer"><button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button><button type="submit" class="btn btn-primary">Salvar alteracoes</button></div></form></div></div>

<script>
let investimentos=[], listaFiltrada=[], empresas=[], tabelaRelacao=null;
function dinheiro(v){return (Number(v)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});}
function dataBR(v){if(!v)return '-'; const p=String(v).split(' ')[0].split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:'-';}
function iso(v){return v?String(v).split(' ')[0]:'';}
function numeroBR(v){return Number(String(v||'0').replace(/\./g,'').replace(',','.'))||0;}
function formatarMoeda(i){let v=i.value.replace(/\D/g,''); v=(Number(v)/100).toFixed(2).replace('.',','); i.value=v.replace(/(\d)(\d{3})(\d{3}),/g,'$1.$2.$3,').replace(/(\d)(\d{3}),/g,'$1.$2,');}
function statusItem(i){const saldo=Number(i.saldo_projetado)||0,pago=Number(i.total_pago)||0; const prazo=iso(i.data_pgto); const hoje=new Date().toISOString().slice(0,10); if(saldo<=0)return ['Quitado','pill-green']; if(pago>0)return ['Parcial','pill-blue']; if(prazo && prazo<hoje)return ['Vencido','pill-red']; if(prazo){const d=(new Date(prazo+'T00:00:00')-new Date(hoje+'T00:00:00'))/86400000; if(d<=30)return ['Vencendo','pill-amber'];} return ['Em aberto','pill-gray'];}
function opts(id, valores){document.getElementById(id).innerHTML='<option value="">Todos</option>'+[...new Set(valores.filter(Boolean))].sort().map(v=>`<option>${v}</option>`).join('');}
function carregarEmpresas(){return fetch('/api/empresas').then(r=>r.json()).then(d=>{empresas=d.dados||[]; editEmpresa.innerHTML=empresas.map(e=>`<option value="${e.id}">${e.nome}</option>`).join('');});}
function carregarRelacao(){fetch('/api/resumo-investimentos').then(r=>r.json()).then(data=>{investimentos=Array.isArray(data.dados)?data.dados:[]; opts('filtroEmpresa',investimentos.map(i=>i.empresa_nome)); opts('filtroTipo',investimentos.map(i=>i.tipo_recurso)); opts('filtroFinalidade',investimentos.map(i=>i.finalidade)); listaFiltrada=investimentos; renderTabela();});}
function aplicarFiltros(){const emp=filtroEmpresa.value,tipo=filtroTipo.value,fin=filtroFinalidade.value,st=filtroStatus.value,busca=filtroBusca.value.toLowerCase(),ini=filtroInicio.value,fim=filtroFim.value,vmin=numeroBR(filtroValorMin.value); listaFiltrada=investimentos.filter(i=>{const s=statusItem(i)[0]; const texto=`${i.nome_investidor||''} ${i.captador||''} ${i.observacoes||''}`.toLowerCase(); return (!emp||i.empresa_nome===emp)&&(!tipo||i.tipo_recurso===tipo)&&(!fin||i.finalidade===fin)&&(!st||s===st)&&(!busca||texto.includes(busca))&&(!ini||iso(i.data_inicio)>=ini)&&(!fim||iso(i.data_pgto)<=fim)&&(!vmin||Number(i.valor_inicial)>=vmin);}); renderTabela();}
function limparFiltros(){['filtroEmpresa','filtroTipo','filtroFinalidade','filtroStatus','filtroBusca','filtroInicio','filtroFim','filtroValorMin'].forEach(id=>document.getElementById(id).value=''); listaFiltrada=investimentos; renderTabela();}
function renderTabela(){const tb=corpoRelacao; tb.innerHTML=''; if(tabelaRelacao){tabelaRelacao.destroy(); tabelaRelacao=null;} listaFiltrada.forEach(i=>{const st=statusItem(i),json=encodeURIComponent(JSON.stringify(i)); tb.innerHTML+=`<tr><td>${i.importacao_id||i.id}</td><td><div class="money">${i.empresa_nome||'-'}</div><div class="muted">${i.finalidade||''}</div></td><td>${i.nome_investidor||'-'}<div class="muted">${i.captador||'-'}</div></td><td><span class="pill pill-blue">${i.tipo_recurso||'-'}</span></td><td class="money">${dinheiro(i.valor_inicial)}</td><td>${Number(i.juros_mensais||0).toLocaleString('pt-BR')}%</td><td>${dataBR(i.data_inicio)}</td><td>${dataBR(i.data_pgto)}</td><td class="money">${dinheiro(i.total_pago)}</td><td class="money">${dinheiro(i.saldo_projetado||i.valor_divida_futuro||i.valor_inicial)}</td><td><span class="pill ${st[1]}">${st[0]}</span></td><td class="d-flex gap-1"><button class="btn btn-sm btn-outline-success" onclick="abrirPagamento(JSON.parse(decodeURIComponent('${json}')))"><i class="bi bi-cash"></i></button><button class="btn btn-sm btn-outline-primary" onclick="abrirEditar(JSON.parse(decodeURIComponent('${json}')))"><i class="bi bi-pencil"></i></button><button class="btn btn-sm btn-outline-danger" onclick="excluirInvestimento(${i.id})"><i class="bi bi-trash"></i></button></td></tr>`;}); if(listaFiltrada.length){tabelaRelacao=$('#tabelaRelacao').DataTable({pageLength:25,language:{sSearch:'Pesquisar:',sLengthMenu:'Exibir _MENU_',sInfo:'Mostrando _START_ ate _END_ de _TOTAL_',oPaginate:{sNext:'Proximo',sPrevious:'Anterior'}}});}}
function abrirPagamento(i){pagamentoInvestimentoId.value=i.id; pagamentoTitulo.innerText=`${i.empresa_nome||'-'} - ${i.nome_investidor||'-'}`; dataPagamento.value=new Date().toISOString().slice(0,10); valorPagamento.value=''; obsPagamento.value=''; bootstrap.Modal.getOrCreateInstance(modalPagamento).show();}
function abrirEditar(i){editId.value=i.id; editEmpresa.value=i.empresa_id||''; editCredor.value=i.nome_investidor||''; editCaptador.value=i.captador||''; editTipo.value=i.tipo_recurso||''; editFinalidade.value=i.finalidade||''; editValor.value=dinheiro(i.valor_inicial).replace('R$ ',''); editJuros.value=Number(i.juros_mensais||0).toLocaleString('pt-BR'); editDataRecurso.value=iso(i.data_inicio); editDataPgto.value=iso(i.data_pgto); editObs.value=i.observacoes||''; bootstrap.Modal.getOrCreateInstance(modalEditar).show();}
function excluirInvestimento(id){if(!confirm('Excluir este lancamento?'))return; fetch('/api/excluir-investimento/'+id,{method:'DELETE'}).then(()=>carregarRelacao());}
formPagamento.addEventListener('submit',e=>{e.preventDefault(); const fd=new FormData(); fd.append('data_pagamento',dataPagamento.value); fd.append('valor_pago',numeroBR(valorPagamento.value)); fd.append('observacoes',obsPagamento.value); fetch('/api/lancar-pagamento-investimento/'+pagamentoInvestimentoId.value,{method:'POST',body:fd}).then(r=>r.json()).then(d=>{if(d.status!=='sucesso')return alert(d.msg||'Erro.'); bootstrap.Modal.getOrCreateInstance(modalPagamento).hide(); carregarRelacao();});});
formEditar.addEventListener('submit',e=>{e.preventDefault(); const fd=new FormData(); fd.append('empresa_id',editEmpresa.value); fd.append('quem',editCredor.value); fd.append('captador',editCaptador.value); fd.append('tipo_recurso',editTipo.value); fd.append('finalidade',editFinalidade.value); fd.append('valor',numeroBR(editValor.value)); fd.append('juros',numeroBR(editJuros.value)); fd.append('data_recurso',editDataRecurso.value); fd.append('data_pgto',editDataPgto.value); fd.append('observacoes',editObs.value); fetch('/api/editar-investimento/'+editId.value,{method:'POST',body:fd}).then(r=>r.json()).then(d=>{if(d.status!=='sucesso')return alert(d.msg||'Erro.'); bootstrap.Modal.getOrCreateInstance(modalEditar).hide(); carregarRelacao();});});
document.addEventListener('DOMContentLoaded',()=>{carregarEmpresas().then(carregarRelacao);});
</script>
{% endblock %}
