<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Novo Investimento - JP2</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .form-container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Registrar Novo Empréstimo/Investimento</h2>
        <form action="/salvar-investimento" method="POST">
            <input type="text" name="nome_investidor" placeholder="Nome do Credor/Terceiro" required>
            <input type="text" name="tipo_operacao" placeholder="Tipo (Ex: Empréstimo Pessoal, Ajuda)" required>
            <input type="number" step="0.01" name="valor_inicial" placeholder="Valor Inicial (R$)" required>
            <input type="date" name="data_inicio" required>
            <input type="number" step="0.0001" name="juros_mensais" placeholder="Juros Mensais (Ex: 0.02 para 2%)" required>
            <textarea name="descricao" placeholder="Descrição ou Detalhes"></textarea>
            <button type="submit">Salvar Investimento</button>
        </form>
    </div>
</body>
</html>
