<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Sócios</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2>Gestão de Sócios</h2>
    <a href="/" class="btn btn-secondary mb-3">Voltar ao Painel</a>

    <form action="{{ url_for('admin_usuarios') }}" method="POST" class="card p-3 mb-4">
    <h5>Cadastrar Novo Sócio</h5>
    <div class="row">
        <div class="col"><input type="text" name="novo_usuario" placeholder="Login (ex: petrick)" class="form-control" required></div>
        <div class="col"><input type="text" name="nome_exibicao" placeholder="Nome Exibição" class="form-control" required></div>
        <div class="col"><input type="password" name="nova_senha" placeholder="Senha" class="form-control" required></div>
        
        <div class="col">
            <button type="submit" class="btn btn-primary">Cadastrar</button>
        </div>
    </div>
</form>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Login</th>
                <th>Nome</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody>
            {% for u in usuarios %}
            <tr>
                <td>{{ u.id }}</td>
                <td>{{ u.usuario }}</td>
                <td>{{ u.nome_exibicao }}</td>
                <td>
                    <form action="/admin/excluir_usuario/{{ u.id }}" method="POST" onsubmit="return confirm('Tem certeza que deseja excluir este sócio?');">
                        <button type="submit" class="btn btn-danger btn-sm">Excluir</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
