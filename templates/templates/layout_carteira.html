<!DOCTYPE html><html lang="pt-br"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Carteira de Investimentos | JP2</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"><style>
body{background:#f4f7fb;display:flex;margin:0;min-height:100vh;color:#101828}.sidebar-toggle-btn{align-items:center;background:#fff;border:1px solid #d7e2ef;border-radius:0 8px 8px 0;box-shadow:0 12px 30px rgba(15,23,42,.16);color:#1e293b;display:inline-flex;height:38px;justify-content:center;left:260px;position:fixed;top:18px;transition:.22s;width:38px;z-index:130}.sidebar-toggle-btn:hover{background:#155eef;border-color:#155eef;color:#fff}body.sidebar-collapsed #sidebar{margin-left:-260px}body.sidebar-collapsed .sidebar-toggle-btn{left:0}#sidebar{background:#101a2b;border-right:1px solid rgba(255,255,255,.08);color:white;flex-shrink:0;padding:24px 18px;width:260px;transition:.22s}.sidebar-kicker{color:#93a4bd;font-size:11px;font-weight:850;letter-spacing:.1em;text-transform:uppercase}.sidebar-title{font-size:22px;font-weight:850;line-height:1.1;margin:6px 0 18px}.sidebar-divider{background:rgba(255,255,255,.12);height:1px;margin:18px 0}.sidebar-section{color:#93a4bd;display:block;font-size:11px;font-weight:850;letter-spacing:.1em;margin:20px 8px 8px;text-transform:uppercase}#sidebar a{align-items:center;border:1px solid transparent;border-radius:8px;color:#d6e0ef;display:flex;font-weight:750;gap:10px;margin-bottom:7px;padding:11px 10px;text-decoration:none}#sidebar a:hover,#sidebar a.active{background:#172b49;border-color:rgba(21,94,239,.45);color:#fff}#sidebar i{color:#7fb4ff;font-size:16px}.content{flex-grow:1;min-width:0;overflow-x:hidden;padding:30px}.cart-shell{max-width:1220px;margin:0 auto;padding-bottom:44px}.head{align-items:flex-start;display:flex;justify-content:space-between;gap:18px;margin-bottom:20px}.kicker{color:#667085;font-size:12px;font-weight:850;letter-spacing:.08em;text-transform:uppercase}.title{color:#101828;font-size:30px;font-weight:850;margin:3px 0 4px}.subtitle{color:#667085;font-size:14px;max-width:760px}.panel{background:#fff;border:1px solid #d9e2ef;border-radius:10px;box-shadow:0 14px 36px rgba(15,23,42,.06)}.metric-grid{display:grid;gap:12px;grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:16px}.metric{background:#fff;border:1px solid #d9e2ef;border-radius:10px;padding:18px;box-shadow:0 14px 36px rgba(15,23,42,.05)}.metric span{color:#667085;display:block;font-size:11px;font-weight:850;letter-spacing:.05em;text-transform:uppercase}.metric strong{display:block;font-size:24px;font-weight:900;margin-top:7px}.form-label{color:#344054;font-size:12px;font-weight:850;letter-spacing:.03em;text-transform:uppercase}.form-control,.form-select{border-color:#d5deeb;border-radius:8px;min-height:42px}.btn{border-radius:8px;font-weight:800}.table thead th{background:#f8fafc;color:#667085;font-size:11px;font-weight:850;letter-spacing:.05em;text-transform:uppercase}.pill{border-radius:999px;display:inline-flex;font-size:11px;font-weight:850;padding:5px 9px}.pill-ok{background:#e7f8ef;color:#067647}.pill-watch{background:#eef4ff;color:#155eef}.pill-stop{background:#fff1f0;color:#b42318}.money{font-weight:900}.muted{color:#667085;font-size:12px}.score{font-size:20px;font-weight:900}@media(max-width:920px){body{display:block}.content{padding:18px 12px}#sidebar{width:100%}.metric-grid{grid-template-columns:1fr 1fr}.head{flex-direction:column}}@media(max-width:560px){.metric-grid{grid-template-columns:1fr}}</style></head><body><button class="sidebar-toggle-btn" type="button" onclick="alternarMenuLateral()" title="Ocultar ou mostrar menu"><i class="bi bi-layout-sidebar-inset"></i></button><aside id="sidebar"><div class="sidebar-kicker">Painel de investimentos</div><div class="sidebar-title">Carteira executiva</div><div class="sidebar-divider"></div><a href="/"><i class="bi bi-arrow-left"></i> Voltar ao Painel</a><span class="sidebar-section">Decisão</span><a href="/carteira" class="{% if request.path == '/carteira/' or request.path == '/carteira' %}active{% endif %}"><i class="bi bi-command"></i> Comando</a><a href="/carteira/onde-aportar" class="{% if '/onde-aportar' in request.path %}active{% endif %}"><i class="bi bi-bullseye"></i> Onde aportar</a><a href="/carteira/resumo" class="{% if '/resumo' in request.path %}active{% endif %}"><i class="bi bi-pie-chart"></i> Resumo</a><span class="sidebar-section">Gestão</span><a href="/carteira/ativos" class="{% if '/ativos' in request.path %}active{% endif %}"><i class="bi bi-wallet2"></i> Ativos</a><a href="/carteira/aportes" class="{% if '/aportes' in request.path %}active{% endif %}"><i class="bi bi-cash-coin"></i> Aportes</a><a href="/carteira/configuracoes" class="{% if '/configuracoes' in request.path %}active{% endif %}"><i class="bi bi-sliders"></i> Política da carteira</a></aside><main class="content">{% with messages=get_flashed_messages() %}{% if messages %}<div class="cart-shell"><div class="alert alert-success">{{ messages[-1] }}</div></div>{% endif %}{% endwith %}{% block content %}{% endblock %}</main><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script><script>function alternarMenuLateral(){const r=document.body.classList.toggle('sidebar-collapsed');localStorage.setItem('jp2CarteiraSidebarCollapsed',r?'1':'0')}document.addEventListener('DOMContentLoaded',()=>{if(localStorage.getItem('jp2CarteiraSidebarCollapsed')==='1')document.body.classList.add('sidebar-collapsed')});function preencherAtivo(btn){const d=btn.dataset;for(const k in d){const el=document.querySelector(`[name="${k}"]`);if(el)el.value=d[k];}scrollTo({top:0,behavior:'smooth'});}</script></body></html>
