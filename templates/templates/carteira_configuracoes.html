{% extends 'layout_carteira.html' %}{% block content %}<div class="cart-shell"><header class="head"><div><div class="kicker">Política da carteira</div><h1 class="title">Metas e limites</h1><div class="subtitle">Defina a carteira ideal. O motor usa estes percentuais para dizer onde aportar.</div></div></header><form method="post"><section class="panel p-3"><table class="table align-middle"><thead><tr><th>Classe</th><th>Meta %</th><th>Limite por ativo %</th><th>Descrição</th></tr></thead><tbody>{% for p in politica %}<tr><td><strong>{{ p.classe }}</strong><input type="hidden" name="classe" value="{{ p.classe }}"></td><td style="width:130px"><input class="form-control" name="alvo_{{ p.classe }}" value="{{ p.percentual_alvo }}"></td><td style="width:160px"><input class="form-control" name="limite_{{ p.classe }}" value="{{ p.limite_por_ativo }}"></td><td><input class="form-control" name="descricao_{{ p.classe }}" value="{{ p.descricao or '' }}"></td></tr>{% endfor %}</tbody></table><div class="text-end"><button class="btn btn-primary"><i class="bi bi-save"></i> Salvar política</button></div></section></form></div>{% endblock %}
