<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Acesso restrito | JP2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f6f8fb; font-family: "Segoe UI", system-ui, sans-serif; }
        .box { width: min(440px, calc(100vw - 32px)); background: #fff; border: 1px solid #dbe3ef; border-radius: 8px; padding: 30px; box-shadow: 0 14px 34px rgba(15, 23, 42, .08); text-align: center; }
        .icon { width: 56px; height: 56px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; background: #fff4e5; color: #b45309; font-size: 26px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <main class="box">
        <div class="icon"><i class="bi bi-shield-lock"></i></div>
        <h1 class="h4 fw-bold">Area restrita</h1>
        <p class="text-secondary mb-4">Voce nao tem permissao de administrador para acessar esta area.</p>
        <a href="/" class="btn btn-primary">Voltar ao Painel</a>
    </main>
</body>
</html>
