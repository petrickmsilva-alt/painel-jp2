{% extends 'layout_carteira.html' %}{% set titulo_pagina='Novo aporte' %}{% block content %}
<section class="panel"><div class="panel-head"><h1 class="panel-title"><i class="bi bi-wallet2"></i>Adicionar novo aporte</h1><a class="btn btn-darkline" href="/carteira">Voltar</a></div><div class="panel-body"><form method="post" class="row g-3"><div class="col-md-4"><label class="form-label">Tipo de ativo</label><select class="form-select" name="classe">{% for c in classes %}<option>{{ c }}</option>{% endfor %}</select></div><div class="col-md-4"><label class="form-label">Ativo</label><select class="form-select" name="ativo_id"><option value="">Sem ativo específico</option>{% for a in ativos %}<option value="{{ a.id }}" {% if ativo_id and ativo_id|string == a.id|string %}selected{% endif %}>{{ a.ticker }} - {{ a.nome }}</option>{% endfor %}</select></div><div class="col-md-4"><label class="form-label">Operação</label><select class="form-select" name="tipo"><option value="compra" {% if tipo != 'venda' %}selected{% endif %}>Compra / aporte</option><option value="venda" {% if tipo == 'venda' %}selected{% endif %}>Venda</option><option value="dividendo">Dividendo</option><option value="JCP">JCP</option></select></div><div class="col-md-3"><label class="form-label">Quantidade</label><input class="form-control" name="quantidade" placeholder="0,00"></div><div class="col-md-3"><label class="form-label">Data da compra</label><input type="date" class="form-control" name="data_aporte" value="{{ hoje }}"></div><div class="col-md-3"><label class="form-label">Preço total</label><input class="form-control" name="valor" placeholder="R$ 0,00" required></div><div class="col-md-3"><label class="form-label">Corretagem</label><input class="form-control" name="observacoes" placeholder="Opcional"></div><div class="col-12 d-flex gap-2"><a class="btn btn-darkline flex-fill" href="/carteira">Cancelar</a><button class="btn btn-green flex-fill">Salvar</button></div></form></div></section>{% endblock %}
