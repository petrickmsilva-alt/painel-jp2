{% extends 'layout_carteira.html' %}{% set titulo_pagina='Novo ativo' %}{% block content %}
<section class="panel"><div class="panel-head"><h1 class="panel-title"><i class="bi bi-plus-circle"></i>Novo ativo</h1><a class="btn btn-darkline" href="/carteira">Voltar</a></div><div class="panel-body"><form id="formAtivo" method="post" class="row g-3"><input type="hidden" name="id"><div class="col-md-3"><label class="form-label">Classe de ativo</label><select class="form-select" name="classe">{% for c in classes %}<option>{{ c }}</option>{% endfor %}</select></div><div class="col-md-3"><label class="form-label">Ticker</label><input class="form-control" name="ticker" placeholder="VALE3" required></div><div class="col-md-6"><label class="form-label">Nome</label><input class="form-control" name="nome" placeholder="Nome do ativo" required></div><div class="col-md-2"><label class="form-label">Quantidade</label><input class="form-control" name="quantidade" placeholder="0"></div><div class="col-md-2"><label class="form-label">Preço médio</label><input class="form-control" name="preco_medio" placeholder="R$ 0,00"></div><div class="col-md-2"><label class="form-label">Valor atual</label><input class="form-control" name="valor_atual" placeholder="R$ 0,00"></div><div class="col-md-2"><label class="form-label">País</label><input class="form-control" name="pais" value="Brasil"></div><div class="col-md-2"><label class="form-label">Moeda</label><input class="form-control" name="moeda" value="BRL"></div><div class="col-md-2"><label class="form-label">Status</label><select class="form-select" name="status"><option value="aportar">Aportar</option><option value="observar" selected>Observar</option><option value="pausar">Pausar</option></select></div><div class="col-md-2"><label class="form-label">DY %</label><input class="form-control" name="dividend_yield"></div><div class="col-md-2"><label class="form-label">ROIC %</label><input class="form-control" name="roic"></div><div class="col-md-2"><label class="form-label">Margem líquida %</label><input class="form-control" name="margem_liquida"></div><div class="col-md-2"><label class="form-label">Dívida/EBITDA</label><input class="form-control" name="divida_ebitda"></div><div class="col-md-2"><label class="form-label">Liquidez diária</label><input class="form-control" name="liquidez_diaria"></div><div class="col-md-2"><label class="form-label">Governança</label><input class="form-control" name="governanca"></div><div class="col-md-2"><label class="form-label">P/L</label><input class="form-control" name="pl"></div><div class="col-md-2"><label class="form-label">P/VP</label><input class="form-control" name="pvp"></div><div class="col-md-2"><label class="form-label">ROE %</label><input class="form-control" name="roe"></div><div class="col-md-2"><label class="form-label">Lucro CAGR %</label><input class="form-control" name="lucro_cagr"></div><div class="col-md-2"><label class="form-label">Preço teto</label><input class="form-control" name="preco_teto"></div><div class="col-12"><label class="form-label">Observações</label><textarea class="form-control" name="observacoes" rows="2"></textarea></div><div class="col-12 d-flex gap-2"><a class="btn btn-darkline flex-fill" href="/carteira">Cancelar</a><button class="btn btn-green flex-fill">Salvar</button></div></form></div></section>{% endblock %}
