<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>Agenda | JP2BUSINESS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    
    <style>
        body { 
            background: #f8fafc; 
            font-family: 'Segoe UI', sans-serif; 
            padding: 30px 20px; 
        }
        
        .agenda-container { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            border: 1px solid #e2e8f0; 
            /* EXPANSÃO DO TAMANHO: Mudou de 600px compactos para 95% da tela no Desktop */
            max-width: 1200px; 
            width: 95%;
            margin: auto; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
        }
        
        /* Cabeçalho mais robusto */
        .agenda-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 15px;
        }

        h2 { 
            font-size: 1.6rem; 
            color: #1e293b !important; 
            font-weight: 700; 
            margin: 0;
        }
        
        /* Ajuste Geral do Calendário para Desktop */
        .fc { 
            font-size: 0.9rem; /* Fonte maior e mais legível */
        } 
        
        .fc-toolbar-title { 
            font-size: 1.4rem !important; 
            font-weight: 700; 
            color: #0f172a;
            text-transform: capitalize;
        }
        
        /* Customização dos Botões superiores */
        .fc .fc-button-primary { 
            background-color: #16a34a !important; 
            border-color: #16a34a !important;
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .fc .fc-button-primary:hover {
            background-color: #15803d !important;
            border-color: #15803d !important;
        }
        
        .btn-voltar {
            padding: 8px 16px; 
            font-size: 0.85rem;
            font-weight: 600;
            background: #fee2e2 !important; 
            color: #b91c1c !important;      
            border: 1px solid #fecaca !important;
            border-radius: 6px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-voltar:hover {
            background: #fca5a5 !important;
        }

        /* Deixando os eventos destacados e bonitos */
        .fc .fc-event { 
            border: none; 
            padding: 4px 8px; 
            cursor: pointer; 
            border-radius: 4px;
            font-weight: 500;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        
        .fc-day-today { 
            background-color: #f8fafc !important; 
            border: 2px solid #3b82f6 !important; /* Destaque azul para o dia atual */
        }
        
        /* Altura ideal para preencher monitores Desktop */
        .fc .fc-daygrid-body { 
            min-height: 550px !important; 
        }
    </style>
</head>
<body>
    <div class="agenda-container">
        <div class="agenda-header">
            <h2>Agenda - JP2BUSINESS</h2>
            <a href="/" class="btn-voltar">
                <i class="bi bi-arrow-left"></i> Voltar ao Painel
            </a>
        </div>
        
        <div id='calendar'></div>
    </div>

    <script>
       document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'pt-br',
        height: 650, /* Altura expandida para preencher melhor a tela */
        
        events: {
            url: '/api/listar-eventos',
            cache: false 
        },
        
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: ''
        },
        eventDidMount: function(info) {
            if (info.event.extendedProps.color || info.event.color) {
                info.el.style.backgroundColor = info.event.extendedProps.color || info.event.color;
                info.el.style.borderColor = info.event.extendedProps.color || info.event.color;
            }
        },
        eventClick: function(info) {
            let senha = prompt("Digite sua senha para confirmar a exclusão:");
            if (senha) {
                let formData = new FormData();
                formData.append('id', info.event.id);
                formData.append('titulo', info.event.title); 
                formData.append('senha', senha);

                fetch('/excluir-evento', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'sucesso') {
                        info.event.remove();
                        console.log("Evento excluído com sucesso!");
                        alert("Compromisso removido com sucesso!");
                    } else {
                        alert("Erro: " + (data.mensagem || "Senha incorreta ou erro no servidor."));
                    }
                })
                .catch(error => {
                    console.error('Erro:', error);
                    alert("Falha ao comunicar com o servidor.");
                });
            }
        }
    });
    
    calendar.render(); 
});
    </script>
</body>
</html>
