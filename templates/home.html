{% extends "dashboard.html" %}

{% block content %}
<div class="row g-3 mb-4">
    <div class="col-md-4">
        <div class="card p-3 shadow-sm border-0 text-center">
            <h6 class="text-muted"><i class="bi bi-folder-fill text-warning"></i> Arquivos Totais</h6>
            <h3 id="dash-arquivos" style="color: #000 !important; font-size: 24px !important;">0</h3>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card p-3 shadow-sm border-0 text-center">
            <h6 class="text-muted"><i class="bi bi-people-fill text-primary"></i> Total de Sócios</h6>
            <h3 id="dash-socios" style="color: #000 !important; font-size: 24px !important;">0</h3>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card p-3 shadow-sm border-0 text-center">
            <h6 class="text-muted"><i class="bi bi-calendar-check-fill text-danger"></i> Próximo Evento</h6>
            <h3 id="dash-agenda" style="color: #000 !important; font-size: 18px !important;">Nenhum</h3>
        </div>
    </div>
</div>

<section id="viewport-explorer">
    <div class="explorer-address-bar mb-3 d-flex justify-content-between align-items-center bg-light p-3 border rounded">
        <div>
            <i class="bi bi-pc-display-horizontal"></i>&nbsp;
            <span id="txtCaminhoWindows" class="fw-bold">INSTITUTO</span>
        </div>
        <a href="/" class="btn btn-sm btn-dark" style="display: block !important; visibility: visible !important;">
            <i class="bi bi-house-door"></i> Voltar ao Painel
        </a>
    </div>

    <div id="progresso-container" class="mb-3 d-none">
        <label class="form-label fw-bold text-success" id="progresso-label">Enviando arquivo: 0%</label>
        <div class="progress" style="height: 20px;">
            <div id="barra-progresso-real" class="progress-bar progress-bar-striped progress-bar-animated bg-success" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">0%</div>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="d-flex gap-2">
            <button class="btn btn-sm btn-outline-secondary px-3" onclick="voltarDiretorio()">
                <i class="bi bi-arrow-left"></i> Voltar Pasta
            </button>
            <button class="btn btn-sm btn-outline-primary px-3" onclick="abrirModalNovaPasta()">
                <i class="bi bi-folder-plus"></i> Nova Pasta
            </button>
            <button class="btn btn-sm btn-success px-3" onclick="abrirModalUploadComContexto()">
                <i class="bi bi-cloud-arrow-up-fill"></i> Enviar Arquivo
            </button>
        </div>
    </div>

    <div class="explorer-grid" id="wrapper-explorer-grid"></div>
</section>

<div class="modal fade" id="modalCriarNovaPasta" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold"><i class="bi bi-folder-plus text-primary"></i> Criar Nova Pasta</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="formNovaPastaNativa">
                    <div class="mb-3">
                        <label class="form-label text-muted">Nome da pasta:</label>
                        <input type="text" class="form-control" id="inputNomePastaNativa" placeholder="Ex: Relatórios Fiscais" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold">Criar Pasta</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalUploadArquivo" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold"><i class="bi bi-cloud-arrow-up"></i> Enviar Arquivos</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="formUploadAvancado">
                    <div class="mb-3">
                        <label class="form-label text-muted">Selecione um ou mais arquivos:</label>
                        <input type="file" class="form-control" id="inputArquivosAvancado" multiple required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 fw-bold">Iniciar Upload</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Ativa a nova janela de criação de pasta de forma direta e independente
    function abrirModalNovaPasta() {
        const modalEl = document.getElementById('modalCriarNovaPasta');
        if (modalEl) {
            const myModal = new bootstrap.Modal(modalEl);
            myModal.show();
        } else {
            alert("Aguardando inicialização dos componentes gráficos...");
        }
    }

    function abrirModalUploadComContexto() {
        const modalEl = document.getElementById('modalUploadArquivo');
        if (modalEl) {
            const myModal = new bootstrap.Modal(modalEl);
            myModal.show();
        } else {
            alert("Aguardando carregamento dos componentes gráficos...");
        }
    }

    // PROCESSAMENTO DO ENVIO DA NOVA PASTA VIA AJAX
    document.getElementById('formNovaPastaNativa').addEventListener('submit', function(e) {
        e.preventDefault();
        const nomePasta = document.getElementById('inputNomePastaNativa').value.strip ? document.getElementById('inputNomePastaNativa').value.strip() : document.getElementById('inputNomePastaNativa').value;
        if (!nomePasta) return;

        const blocoAtual = window.currentBloco || 'arquivos_gerais';
        const categoriaAtual = window.currentCategoria || 'raiz';
        const pastaPaiId = window.currentPastaPaiId || '';

        const formData = new FormData();
        formData.append('nome', nomePasta);
        formData.append('bloco', blocoAtual);
        formData.append('categoria', categoriaAtual);
        formData.append('pasta_pai_id', pastaPaiId);

        const modalEl = document.getElementById('modalCriarNovaPasta');
        const modalInstance = bootstrap.Modal.getInstance(modalEl);
        if (modalInstance) modalInstance.hide();

        fetch('/criar-pasta', {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(resposta => {
            if (resposta.status === 'sucesso') {
                document.getElementById('inputNomePastaNativa').value = '';
                if (typeof window.atualizarExplorer === 'function') { window.atualizarExplorer(); }
                else { window.location.reload(); }
            } else {
                alert('Erro ao tentar criar a pasta no servidor.');
            }
        })
        .catch(() => alert('Erro crítico na rede ao criar pasta.'));
    });

    // INTERCEPTAÇÃO INTELIGENTE DO FORMULÁRIO PARA EXIBIR A BARRA DE PROGRESSO
    document.getElementById('formUploadAvancado').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const input = document.getElementById('inputArquivosAvancado');
        if (input.files.length === 0) return;

        const formData = new FormData();
        for (let i = 0; i < input.files.length; i++) {
            formData.append('arquivos', input.files[i]);
        }

        const blocoAtual = window.currentBloco || 'arquivos_gerais';
        const categoriaAtual = window.currentCategoria || 'raiz';
        const pastaPaiId = window.currentPastaPaiId || '';

        formData.append('bloco', blocoAtual);
        formData.append('categoria', categoriaAtual);
        formData.append('pasta_pai_id', pastaPaiId);

        const modalEl = document.getElementById('modalUploadArquivo');
        const modalInstance = bootstrap.Modal.getInstance(modalEl);
        if (modalInstance) modalInstance.hide();

        const progressoContainer = document.getElementById('progresso-container');
        const barraReal = document.getElementById('barra-progresso-real');
        const labelProgresso = document.getElementById('progresso-label');

        progressoContainer.classList.remove('d-none');
        barraReal.style.width = '0%';
        barraReal.innerText = '0%';
        labelProgresso.innerText = 'Enviando arquivo: 0%';

        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/upload-avancado', true);

        xhr.upload.addEventListener('progress', function(e) {
            if (e.lengthComputable) {
                const percentual = Math.round((e.loaded / e.total) * 100);
                barraReal.style.width = percentual + '%';
                barraReal.setAttribute('aria-valuenow', percentual);
                barraReal.innerText = percentual + '%';
                labelProgresso.innerText = 'Enviando arquivo: ' + percentual + '%';
            }
        });

        xhr.onload = function() {
            if (xhr.status === 200) {
                const resposta = JSON.parse(xhr.responseText);
                if (resposta.status === 'sucesso') {
                    labelProgresso.innerText = 'Upload concluído com sucesso!';
                    setTimeout(() => {
                        progressoContainer.classList.add('d-none');
                        if (typeof window.atualizarExplorer === 'function') { window.atualizarExplorer(); }
                        else { window.location.reload(); }
                    }, 1500);
                } else {
                    alert('Erro ao processar o upload do arquivo.');
                    progressoContainer.classList.add('d-none');
                }
            } else {
                alert('Erro na comunicação com o servidor.');
                progressoContainer.classList.add('d-none');
            }
        };

        xhr.onerror = function() {
            alert('Falha crítica no envio do arquivo.');
            progressoContainer.classList.add('d-none');
        };

        xhr.send(formData);
    });

    document.addEventListener('DOMContentLoaded', function() {
        const btnVoltar = document.createElement('a');
        btnVoltar.href = '/';
        btnVoltar.innerHTML = '⬅ VOLTAR AO PAINEL';
        
        btnVoltar.style.position = 'fixed';
        btnVoltar.style.top = '20px';
        btnVoltar.style.right = '20px';
        btnVoltar.style.zIndex = '999999';
        btnVoltar.style.padding = '15px 25px';
        btnVoltar.style.backgroundColor = '#000';
        btnVoltar.style.color = '#fff';
        btnVoltar.style.borderRadius = '5px';
        btnVoltar.style.textDecoration = 'none';
        btnVoltar.style.fontWeight = 'bold';
        
        document.body.appendChild(btnVoltar);

        fetch('/api/resumo-dashboard')
        .then(res => res.json())
        .then(data => {
            if(data.total_arquivos !== undefined) {
                document.getElementById('dash-arquivos').innerText = data.total_arquivos;
                document.getElementById('dash-socios').innerText = data.total_socios;
                document.getElementById('dash-agenda').innerText = data.proximo_evento;
            }
        });
    });
</script>
{% endblock %}
