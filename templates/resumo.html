<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Racional de Investimentos</title>
    </head>
<body class="bg-light">

<div class="container-fluid p-4">
    <h2 class="mb-4">Racional de Investimentos</h2>

    <div class="card p-3 mb-4">
        <div class="row g-3">
            <div class="col-md-2"><input type="text" class="form-control" placeholder="Empresa"></div>
            <div class="col-md-2"><input type="text" class="form-control" placeholder="Credor"></div>
            <div class="col-md-2"><input type="text" class="form-control" placeholder="Mês/Ano"></div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100">Filtrar</button>
            </div>
            <div class="col-md-4 text-end">
                <div class="alert alert-info m-0 p-2">Subtotal: R$ 0,00</div>
            </div>
        </div>
    </div>

    <div class="card p-3 mb-4">
        <h5>Dados Filtrados</h5>
        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr><th>Empresa</th><th>Credor</th><th>Valor</th><th>Data</th></tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </div>

    <div class="card p-3">
        <h5>Correlação de Investimentos</h5>
        <div class="table-responsive">
            <table class="table table-bordered">
                <thead class="table-light">
                    <tr><th>Credor</th><th>Participação (%)</th><th>ROI Projetado</th><th>Status</th></tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
