{% extends 'layout_base.html' %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Cadastro de Investimento</h2>
    </div>

    <div class="card p-4 mb-4 shadow-sm">
        <h5>Registrar Novo Investimento</h5>
        <hr>
        <form id="formInvestimento" class="row g-3">
            <div class="col-12">
                <label class="form-label">Credor</label>
                <input type="text" name="quem" class="form-control" placeholder="Nome do Credor" required>
            </div>
            
            <div class="col-md-3">
                <label class="form-label">Valor (R$)</label>
                <input type="text" name="valor" id="inputValor" class="form-control" onkeyup="formatarMoeda(this)" placeholder="0,00" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Instituição</label>
                <input type="text" name="instituicao" class="form-control" placeholder="Ex: Banco X">
            </div>
            <div class="col-md-2">
                <label class="form-label">Juros (%)</label>
                <input type="text" name="juros" id="inputJuros" class="form-control" onblur="formatarJuros(this)" placeholder="0,00" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Mês/Ano</label>
                <input type="text" name="mes_ano" class="form-control" placeholder="06/2026" required>
            </div>
            
            <div class="col-12">
                <label class="form-label">Descrição</label>
                <input type="text" name="detalhes" class="form-control" placeholder="Detalhes do investimento">
            </div>

            <div class="col-12 mt-3">
                <button type="button" class="btn btn-primary" onclick="salvarInvestimento()">Salvar</button>
                <button type="reset" class="btn btn-secondary">Limpar</button>
            </div>
        </form>
    </div>
</div>

<script>
    function salvarInvestimento() {
        const form = document.getElementById('formInvestimento');
        const formData = new FormData(form);

        // Limpa a máscara de moeda (1.000,00 -> 1000.00)
        let valorRaw = formData.get('valor').replace(/\./g, '').replace(',', '.');
        // Limpa a máscara de juros (0,04 -> 0.04)
        let jurosRaw = formData.get('juros').replace(',', '.');

        formData.set('valor', valorRaw);
        formData.set('juros', jurosRaw);

        fetch('/api/adicionar-investimento', { method: 'POST', body: formData })
        .then(res => res.json())
        .then(data => {
            if(data.status === 'sucesso') { 
                alert('Investimento cadastrado com sucesso!');
                form.reset(); 
            } else { 
                alert('Erro: ' + data.msg); 
            }
        });
    }

    function formatarMoeda(input) {
        let v = input.value.replace(/\D/g, '');
        v = (v / 100).toFixed(2) + '';
        v = v.replace(".", ",");
        v = v.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
        v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
        input.value = v;
    }

    function formatarJuros(input) {
        let v = input.value.replace(',', '.');
        // Se o valor for maior que 1, assume que digitou 4 (inteiro) e converte para 0,04
        if (v > 1) { 
            input.value = (v / 100).toFixed(2).replace('.', ','); 
        }
    }
</script>
{% endblock %}
