{% extends 'layout_base.html' %}

{% block content %}
<div class="container-fluid p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Cadastro de Investimento</h2>
    </div>

    <div class="card p-3 mb-4 shadow-sm" style="max-width: 100%;">
    <h5 class="mb-3">Registrar Novo Investimento</h5>
    <form id="formInvestimento" class="row g-2 align-items-end">
        <div class="col-md-3">
            <label class="form-label small fw-bold">Credor</label>
            <input type="text" name="quem" class="form-control form-control-sm" required>
        </div>
        <div class="col-md-2">
            <label class="form-label small fw-bold">Valor (R$)</label>
            <input type="text" name="valor" class="form-control form-control-sm" onkeyup="formatarMoeda(this)" required>
        </div>
        <div class="col-md-2">
            <label class="form-label small fw-bold">Empresa</label>
            <input type="text" name="detalhes" class="form-control form-control-sm">
        </div>
        <div class="col-md-1">
            <label class="form-label small fw-bold">Juros</label>
            <input type="text" name="juros" class="form-control form-control-sm" onblur="formatarJuros(this)" required>
        </div>
        <div class="col-md-2">
            <label class="form-label small fw-bold">Mês/Ano</label>
            <input type="text" name="mes_ano" class="form-control form-control-sm" required>
        </div>
        <div class="col-md-2">
            <button type="button" class="btn btn-primary btn-sm w-100" onclick="salvarInvestimento()">Salvar Registro</button>
        </div>
        <div class="col-12 mt-2">
            <label class="form-label small fw-bold">Descrição</label>
            <input type="text" name="descricao" class="form-control form-control-sm" placeholder="Detalhes adicionais...">
        </div>
    </form>
</div>
            
            <div class="col-12 mt-3">
                <button type="button" class="btn btn-primary px-4" onclick="salvarInvestimento()">Salvar Registro</button>
                <button type="reset" class="btn btn-secondary">Limpar</button>
            </div>
        </form>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
            <h5 class="mb-0">Investimentos Cadastrados</h5>
        </div>
        <div class="table-responsive">
            <table class="table table-striped table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Credor</th>
                        <th>Valor Inicial</th>
                        <th>Empresa</th>
                        <th>Juros</th>
                        <th>Mês</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function carregarTabela() {
        fetch('/api/resumo-investimentos')
        .then(res => res.json())
        .then(data => {
            const tbody = document.getElementById('corpoTabela');
            tbody.innerHTML = '';
            if(data.status === 'sucesso') {
                data.dados.forEach(item => {
                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${item.credor}</strong></td>
                            <td>R$ ${parseFloat(item.valor_investido).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                            <td>${item.empresa || '-'}</td>
                            <td>${item.juros || '0'}%</td>
                            <td>${item.mes_ano || '-'}</td>
                        </tr>`;
                });
            }
        });
    }

    function salvarInvestimento() {
        const form = document.getElementById('formInvestimento');
        const formData = new FormData(form);

        let valorRaw = formData.get('valor').replace(/\./g, '').replace(',', '.');
        let jurosRaw = formData.get('juros').replace(',', '.');

        formData.set('valor', valorRaw);
        formData.set('juros', jurosRaw);

        fetch('/api/adicionar-investimento', { method: 'POST', body: formData })
        .then(res => res.json())
        .then(data => {
            if(data.status === 'sucesso') { 
                alert('Investimento cadastrado!');
                form.reset(); 
                carregarTabela(); // Atualiza a tabela na tela
            } else { 
                alert('Erro: ' + data.msg); 
            }
        });
    }

    function formatarMoeda(input) {
        let v = input.value.replace(/\D/g, '');
        v = (v / 100).toFixed(2) + '';
        v = v.replace(".", ",");
        v = v.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
        v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
        input.value = v;
    }

    function formatarJuros(input) {
        let v = input.value.replace(',', '.');
        if (v > 1) { input.value = (v / 100).toFixed(2).replace('.', ','); }
    }

    document.addEventListener('DOMContentLoaded', carregarTabela);
</script>
{% endblock %}
