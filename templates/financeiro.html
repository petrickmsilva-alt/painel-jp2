{% extends 'layout_base.html' %}

{% block content %}
<div class="container-fluid p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Cadastro de Investimento</h2>
    </div>

    <div class="card p-3 mb-4 shadow-sm">
        <h5 class="mb-3">Registrar Novo Investimento</h5>
        <form id="formInvestimento" class="row g-2 align-items-end">
            <div class="col-md-3">
                <label class="form-label small fw-bold">Credor</label>
                <input type="text" name="quem" class="form-control form-control-sm" required>
            </div>
            <div class="col-md-2">
                <label class="form-label small fw-bold">Valor (R$)</label>
                <input type="text" name="valor" class="form-control form-control-sm" onkeyup="formatarMoeda(this)" required>
            </div>
            <div class="col-md-2">
                <label class="form-label small fw-bold">Empresa</label>
                <input type="text" name="detalhes" class="form-control form-control-sm">
            </div>
            <div class="col-md-1">
                <label class="form-label small fw-bold">Juros (%)</label>
                <input type="text" name="juros" class="form-control form-control-sm" onblur="formatarJuros(this)" required>
            </div>
            <div class="col-md-2">
                <label class="form-label small fw-bold">Mês/Ano</label>
                <input type="text" name="mes_ano" class="form-control form-control-sm" required>
            </div>
            <div class="col-md-2">
                <button type="button" class="btn btn-primary btn-sm w-100" onclick="salvarInvestimento()">Salvar Registro</button>
            </div>
            <div class="col-12 mt-2">
                <label class="form-label small fw-bold">Descrição</label>
                <input type="text" name="descricao" class="form-control form-control-sm" placeholder="Detalhes adicionais...">
            </div>
        </form>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
            <h5 class="mb-0">Investimentos Cadastrados</h5>
        </div>
        <div class="table-responsive p-3">
            <table class="table table-striped table-hover align-middle" id="tabelaInvestimentos">
                <thead class="table-light">
                    <tr>
                        <th>Credor</th><th>Valor</th><th>Empresa</th><th>Juros</th><th>Mês</th><th>Descrição</th><th>Ações</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function carregarTabela() {
        fetch('/api/resumo-investimentos')
        .then(res => res.json())
        .then(data => {
            const tbody = document.getElementById('corpoTabela');
            tbody.innerHTML = '';
            if(data.status === 'sucesso') {
                // Destruir DataTable antigo se existir
                if ($.fn.DataTable.isDataTable('#tabelaInvestimentos')) {
                    $('#tabelaInvestimentos').DataTable().destroy();
                }
                
                data.dados.forEach(item => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${item.credor}</td>
                            <td>R$ ${parseFloat(item.valor_investido).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                            <td>${item.empresa || '-'}</td>
                            <td>${item.juros || '0'}%</td>
                            <td>${item.mes_ano || '-'}</td>
                            <td>${item.descricao || '-'}</td>
                            <td><button class="btn btn-sm btn-outline-danger" onclick="excluir(${item.id})">Excluir</button></td>
                        </tr>`;
                });
                
                // Ativar filtros
                $('#tabelaInvestimentos').DataTable({
                    language: { url: '//cdn.datatables.net/plug-ins/1.13.4/i18n/pt-BR.json' }
                });
            }
        });
    }

    function excluir(id) {
        if(confirm('Excluir este registro?')) {
            fetch('/api/excluir-investimento/' + id, { method: 'DELETE' })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'sucesso') carregarTabela();
                else alert('Erro: ' + data.msg);
            });
        }
    }

    function salvarInvestimento() {
        const form = document.getElementById('formInvestimento');
        const formData = new FormData(form);
        formData.set('valor', formData.get('valor').replace(/\./g, '').replace(',', '.'));
        formData.set('juros', formData.get('juros').replace(',', '.'));

        fetch('/api/adicionar-investimento', { method: 'POST', body: formData })
        .then(res => res.json())
        .then(data => {
            if(data.status === 'sucesso') { 
                alert('Cadastrado!');
                form.reset(); 
                carregarTabela(); 
            } else alert('Erro: ' + data.msg);
        });
    }

    function formatarMoeda(i) { let v = i.value.replace(/\D/g,''); v=(v/100).toFixed(2).replace('.',','); i.value = v.replace(/(\d)(\d{3})(\d{3}),/g,"$1.$2.$3,").replace(/(\d)(\d{3}),/g,"$1.$2,"); }
    function formatarJuros(i) { let v = i.value.replace(',', '.'); if(v>1) i.value = (v/100).toFixed(2).replace('.',','); }

    document.addEventListener('DOMContentLoaded', carregarTabela);
</script>
{% endblock %}
