{% extends 'layout_base.html' %}

{% block content %}
<style>
    /* Ajusta a caixa de busca para o tamanho do conteúdo */
    .dataTables_filter { display: flex; justify-content: flex-end; align-items: center; gap: 10px; margin-bottom: 10px; }
    .dataTables_filter input { width: auto !important; display: inline-block; }
</style>

<div class="container-fluid p-4">
    <h2 class="mb-4">Gestão de Investimentos</h2>

    <div class="card p-4 shadow-sm mb-4">
        <h5 class="mb-4">Novo Lançamento</h5>
        <form id="formInvestimento" class="row g-3">
            <div class="col-md-6">
                <label class="form-label fw-bold">Empresa 
                    <button type="button" class="btn btn-sm btn-link p-0 ms-2" onclick="abrirModalEmpresa()">+ Cadastrar Nova</button>
                </label>
                <select name="empresa_id" class="form-select" id="selectEmpresa" required></select>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold">Credor</label>
                <input type="text" name="quem" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold">Captador de Recursos</label>
                <input type="text" name="captador" class="form-control">
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold">Tipo de Recurso</label>
                <select name="tipo_recurso" class="form-select">
                    <option value="Proprio">Próprio</option>
                    <option value="Terceiros Particular">Terceiros Particular</option>
                    <option value="Instituicoes Financeiras">Instituições Financeiras</option>
                    <option value="Empresas Privadas">Empresas Privadas</option>
                    <option value="Investidor PF">Investidor PF</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold">Finalidade</label>
                <select name="finalidade" class="form-select">
                    <option value="Pagamento Contas">Pagamento Contas</option>
                    <option value="Aporte Financeiro">Aporte Financeiro</option>
                    <option value="Emprestimo">Empréstimo</option>
                    <option value="Aplicacao Investidor">Aplicação Investidor</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold">Valor da Verba (R$)</label>
                <input type="text" name="valor" class="form-control" onkeyup="formatarMoeda(this)" required>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold">Taxa de Juros (%)</label>
                <input type="text" name="juros" class="form-control" onblur="formatarJuros(this)">
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold">Data do Recurso</label>
                <input type="date" name="data_recurso" class="form-control">
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold">Data de Pagamento</label>
                <input type="date" name="data_pgto" class="form-control">
            </div>
            <div class="col-12 text-end">
                <button type="button" class="btn btn-primary" onclick="salvarInvestimento()">SALVAR REGISTRO</button>
            </div>
        </form>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-header bg-dark text-white"><h5>Investimentos Cadastrados</h5></div>
        <div class="table-responsive p-3">
            <table class="table table-hover table-striped align-middle" id="tabelaInvestimentos">
                <thead><tr><th>Credor</th><th>Valor</th><th>Tipo</th><th>Finalidade</th><th>Captador</th><th>Juros</th><th>Data</th><th>Ações</th></tr></thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-secondary text-white"><h5>Empresas Cadastradas</h5></div>
        <div class="table-responsive p-3">
            <table class="table table-striped table-hover" id="tabelaEmpresas">
                <thead><tr><th>Nome</th><th>CNPJ</th><th>Ramo</th><th>Ações</th></tr></thead>
                <tbody id="corpoTabelaEmpresas"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="modalEmpresa" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Cadastrar Nova Empresa</h5></div>
            <div class="modal-body">
                <form id="formEmpresa">
                    <div class="mb-3"><label>Nome</label><input type="text" id="empNome" class="form-control" required></div>
                    <div class="mb-3"><label>CNPJ</label><input type="text" id="empCnpj" class="form-control" onkeyup="mascaraCNPJ(this)"></div>
                    <div class="mb-3"><label>Ramo</label><input type="text" id="empRamo" class="form-control"></div>
                </form>
            </div>
            <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button><button class="btn btn-primary" onclick="salvarEmpresa()">Salvar</button></div>
        </div>
    </div>
</div>

<script>
    function carregarEmpresas() {
        fetch('/api/empresas').then(res => res.json()).then(data => {
            const select = document.getElementById('selectEmpresa');
            select.innerHTML = '<option value="">Selecione uma empresa...</option>';
            if(data.status === 'sucesso' && data.dados) {
                data.dados.forEach(emp => { select.innerHTML += `<option value="${emp.id}">${emp.nome}</option>`; });
            }
        });
    }

    function carregarTabelaEmpresas() {
        fetch('/api/empresas').then(res => res.json()).then(data => {
            const tbody = document.getElementById('corpoTabelaEmpresas');
            tbody.innerHTML = '';
            if(data.status === 'sucesso' && data.dados) {
                data.dados.forEach(item => {
                    tbody.innerHTML += `<tr>
                        <td>${item.nome || '-'}</td>
                        <td>${item.cnpj || '-'}</td>
                        <td>${item.ramo_atividade || '-'}</td>
                        <td><button class="btn btn-sm btn-danger" onclick="excluirEmpresa('${item.id}')"><i class="bi bi-trash"></i></button></td>
                    </tr>`;
                });
            }
        });
    }

    function salvarEmpresa() {
        const formData = new FormData();
        formData.append('nome', document.getElementById('empNome').value);
        formData.append('cnpj', document.getElementById('empCnpj').value);
        formData.append('ramo_atividade', document.getElementById('empRamo').value);
        fetch('/api/adicionar-empresa', { method: 'POST', body: formData })
        .then(() => { $('#modalEmpresa').modal('hide'); document.getElementById('formEmpresa').reset(); carregarTabelaEmpresas(); carregarEmpresas(); });
    }

    function excluirEmpresa(id) {
        if(confirm('Tem certeza?')) fetch(`/api/excluir-empresa/${id}`, { method: 'DELETE' }).then(() => { carregarTabelaEmpresas(); carregarEmpresas(); });
    }

    function carregarTabela() {
        fetch('/api/resumo-investimentos')
        .then(res => res.json())
        .then(data => {
            const tbody = document.getElementById('corpoTabela');
            tbody.innerHTML = ''; 
            
            if(data.status === 'sucesso' && Array.isArray(data.dados)) {
                if ($.fn.DataTable.isDataTable('#tabelaInvestimentos')) {
                    $('#tabelaInvestimentos').DataTable().destroy();
                }

                data.dados.forEach(item => {
                    let valorNumerico = parseFloat(item.valor_inicial) || 0;
                    let valorFormatado = valorNumerico.toLocaleString('pt-BR', {minimumFractionDigits: 2});
                    
                    let dataLimpa = '-';
                    if (item.data_pgto) {
                        let partes = item.data_pgto.split(' ')[0].split('-');
                        if(partes.length === 3) dataLimpa = `${partes[2]}/${partes[1]}/${partes[0]}`;
                    }
                    
                    tbody.innerHTML += `
                        <tr>
                            <td>${item.nome_investidor || '-'}</td>
                            <td>R$ ${valorFormatado}</td>
                            <td>${item.tipo_operacao || '-'}</td>
                            <td>${item.finalidade || '-'}</td>
                            <td>${item.captador || '-'}</td>
                            <td>${item.juros_mensais || '0'}%</td>
                            <td>${dataLimpa}</td>
                            <td><button class="btn btn-sm btn-outline-danger" onclick="excluirInvestimento(${item.id})">Excluir</button></td>
                        </tr>`;
                });

                $('#tabelaInvestimentos').DataTable({
                    pageLength: 10,
                    lengthMenu: [5, 10, 25, 50],
                    responsive: true,
                    ordering: true,
                    language: {
                        "sEmptyTable": "Nenhum registro encontrado",
                        "sInfo": "Mostrando _START_ até _END_ de _TOTAL_ registros",
                        "sLengthMenu": "Exibir _MENU_ resultados",
                        "sSearch": "Pesquisar:",
                        "oPaginate": { "sNext": "Próximo", "sPrevious": "Anterior" }
                    }
                });
            }
        });
    }    
    
    function salvarInvestimento() {
        const formData = new FormData(document.getElementById('formInvestimento'));
        formData.set('valor', formData.get('valor').replace(/\./g, '').replace(',', '.'));
        fetch('/api/adicionar-investimento', { method: 'POST', body: formData })
        .then(() => { alert('Cadastrado!'); document.getElementById('formInvestimento').reset(); carregarTabela(); });
    }

    function excluirInvestimento(id) {
    if(confirm('Tem certeza que deseja excluir este investimento?')) {
        fetch('/api/excluir-investimento/' + id, { method: 'DELETE' })
        .then(res => res.json())
        .then(data => {
            if(data.status === 'sucesso') {
                alert('Item excluído com sucesso!');
                carregarTabela(); // Isso recarrega a tabela automaticamente!
            } else {
                alert('Erro ao excluir: ' + (data.msg || 'Erro desconhecido'));
            }
        })
        .catch(err => console.error("Erro na exclusão:", err));
    }
}

    function mascaraCNPJ(i){ i.value = i.value.replace(/\D/g,'').replace(/^(\d{2})(\d)/,'$1.$2').replace(/^(\d{2})\.(\d{3})(\d)/,'$1.$2.$3').replace(/\.(\d{3})(\d)/,'.$1/$2').replace(/(\d{4})(\d)/,'$1-$2'); }
    function formatarMoeda(i) { let v = i.value.replace(/\D/g,''); v=(v/100).toFixed(2).replace('.',','); i.value = v.replace(/(\d)(\d{3})(\d{3}),/g,"$1.$2.$3,").replace(/(\d)(\d{3}),/g,"$1.$2,"); }
    function formatarJuros(i) { let v = i.value.replace(',', '.'); if(v>1) i.value = (v/100).toFixed(2).replace('.',','); }
    function abrirModalEmpresa() { $('#modalEmpresa').modal('show'); }

    document.addEventListener('DOMContentLoaded', () => { carregarTabela(); carregarEmpresas(); carregarTabelaEmpresas(); });
</script>
{% endblock %}
