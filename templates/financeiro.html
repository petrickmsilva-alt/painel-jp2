{% extends 'layout_base.html' %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Gestão Financeira</h2>
    </div>

    <div class="card p-4 mb-4 shadow-sm">
        <h5>Registrar Novo Investimento</h5>
        <hr>
        <form id="formInvestimento" class="row g-3">
            <div class="col-md-3">
                <label class="form-label">Quem (Credor)</label>
                <input type="text" name="quem" class="form-control" placeholder="Nome" required>
            </div>
            <div class="col-md-2">
                <label class="form-label">Valor (R$)</label>
                <input type="number" step="0.01" name="valor" class="form-control" placeholder="0.00" required>
            </div>
            <div class="col-md-2">
                <label class="form-label">Juros (%)</label>
                <input type="number" step="0.01" name="juros" class="form-control" placeholder="0.00" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Mês/Ano</label>
                <input type="text" name="mes_ano" class="form-control" placeholder="06/2026" required>
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button type="button" class="btn btn-primary w-100" onclick="salvarInvestimento()">Salvar</button>
            </div>
        </form>
    </div>

    <div class="card p-4 shadow-sm">
        <input type="text" id="filtro" class="form-control mb-3" placeholder="Pesquisar entidade..." onkeyup="filtrarTabela()">
        <div class="table-responsive">
            <table class="table table-hover" id="tabelaFinanceiro">
                <thead class="table-dark">
                    <tr>
                        <th>Entidade</th>
                        <th>Valor Inicial</th>
                        <th>Juros %</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela">
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function salvarInvestimento() {
        let formData = new FormData(document.getElementById('formInvestimento'));
        fetch('/api/adicionar-investimento', { method: 'POST', body: formData })
        .then(res => res.json())
        .then(data => {
            if(data.status === 'sucesso') { 
                alert('Salvo com sucesso!');
                location.reload(); 
            } else { 
                alert('Erro: ' + data.msg); 
            }
        });
    }

    fetch('/api/financeiro/dados')
        .then(res => res.json())
        .then(data => {
            const corpo = document.getElementById('corpoTabela');
            corpo.innerHTML = ''; // Limpa antes de carregar
            data.forEach(item => {
                corpo.innerHTML += `<tr>
                    <td>${item.quem || ''}</td>
                    <td>R$ ${parseFloat(item.valor || 0).toFixed(2)}</td>
                    <td>${item.juros || 0}%</td>
                    <td><span class="badge bg-success">Ativo</span></td>
                </tr>`;
            });
        });

    function filtrarTabela() {
        let input = document.getElementById('filtro').value.toUpperCase();
        let tr = document.getElementById('tabelaFinanceiro').getElementsByTagName('tr');
        for (let i = 1; i < tr.length; i++) {
            let td = tr[i].getElementsByTagName('td')[0];
            if (td) {
                tr[i].style.display = td.innerText.toUpperCase().indexOf(input) > -1 ? "" : "none";
            }
        }
    }
</script>
{% endblock %}
