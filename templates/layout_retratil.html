<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JP2Business | Painel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body { display: flex; font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; }
        #sidebar { width: 250px; min-height: 100vh; transition: all 0.3s; background: #1e293b; color: white; flex-shrink: 0; }
        #sidebar.active { margin-left: -250px; }
        .content { width: 100%; padding: 20px; transition: all 0.3s; }
        .nav-link { font-weight: 600; padding: 12px 20px; }
        .nav-link:hover { background: #334155; }
    </style>
</head>
<body>

<nav id="sidebar" class="p-3">
    <h4>JP2Business</h4>
    <hr>
    <ul class="nav flex-column">
        <li class="nav-item"><a href="/" class="nav-link text-white"><i class="bi bi-house"></i> Painel Inicial</a></li>
        <li class="nav-item"><a href="/agenda" class="nav-link text-white"><i class="bi bi-calendar-event"></i> Agenda</a></li>
        <li class="nav-item"><a href="/admin/logs" class="nav-link text-white"><i class="bi bi-clipboard-data"></i> Auditoria</a></li>
        <li class="nav-item"><a href="/logout" class="nav-link text-white"><i class="bi bi-box-arrow-right"></i> Sair</a></li>
    </ul>
</nav>

<div class="content">
    <button id="sidebarCollapse" class="btn btn-dark mb-3">Menu</button>
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('sidebarCollapse').addEventListener('click', function() {
        document.getElementById('sidebar').classList.toggle('active');
    });
</script>
</body>
</html>
